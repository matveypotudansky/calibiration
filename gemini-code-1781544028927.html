<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рандомайзер Жеребьевки</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 50px rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #ffffff;
            font-size: 26px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(56, 189, 248, 0.3);
        }
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        select, button {
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        select {
            flex: 2;
            background-color: #1e293b;
            color: #f1f5f9;
            border: 1px solid #334155;
            cursor: pointer;
        }
        select:hover {
            border-color: #38bdf8;
            background-color: #243249;
        }
        button {
            flex: 1;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
        }
        button:active {
            transform: translateY(0);
        }
        
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .group-container {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .group-title {
            font-size: 18px;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 6px;
            text-align: left;
        }

        .match-list {
            margin-top: 10px;
            text-align: left;
        }
        .match {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #38bdf8;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            animation: fadeInMatch 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: all 0.2s ease;
        }
        .match:hover {
            transform: translateX(2px) scale(1.01);
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        .team {
            width: 40%;
            font-weight: 600;
            font-size: 14px;
            color: #cbd5e1;
            transition: color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .match:hover .team {
            color: #ffffff;
        }
        .team.home { text-align: right; }
        .team.away { text-align: left; }
        
        .clickable-team {
            cursor: pointer;
        }
        .clickable-team:hover {
            color: #38bdf8 !important;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
        }

        .score-input {
            width: 35px;
            padding: 4px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            background: #0f172a;
            color: #fff;
            border: 1px solid #334155;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        .score-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            background: #1e293b;
            outline: none;
        }
        .score-input::-webkit-outer-spin-button,
        .score-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .score-input { -moz-appearance: textfield; }
        
        .vs {
            display: inline-block;
            font-size: 12px;
            margin: 0 5px;
            animation: pulseVs 2s infinite ease-in-out;
        }
        
        .playoffs-container {
            margin-top: 40px;
            border-top: 2px dashed rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            display: none;
        }
        .stage-title {
            font-size: 20px;
            font-weight: bold;
            color: #fbbf24;
            margin-top: 25px;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(251, 191, 36, 0.2);
        }
        .playoff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
        }

        @keyframes fadeInMatch {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes pulseVs {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Жеребьевка турниров (32 команды)</h1>
    
    <div class="controls">
        <select id="tournament-select">
            <option value="cl">Лига Чемпионов (Клубы)</option>
            <option value="wc">Чемпионат Мира (Страны)</option>
        </select>
        <button onclick="drawTournament()">Создать</button>
    </div>

    <div id="bracket">
        </div>
</div>

<script>
    const clClubs = [
        "Реал Мадрид", "Манчестер Сити", "Бавария", "ПСЖ", "Барселона", "Ливерпуль", "Интер", "Арсенал",
        "Атлетико", "Боруссия Д", "Ювентус", "Милан", "Байер", "Аталанта", "Спортинг", "Бенфика",
        "Порту", "Аякс", "ПСВ", "Фейеноорд", "Рома", "Лацио", "Ньюкасл", "Тоттенхэм",
        "Монако", "Лилль", "Марсель", "РБ Лейпциг", "Айнтрахт", "Селтик", "Шахтер", "Динамо Загреб"
    ];

    const wcCountries = [
        "Аргентина", "Франция", "Бразилия", "Англия", "Испания", "Германия", "Португалия", "Италия",
        "Нидерланды", "Бельгия", "Хорватия", "Уругвай", "Колумбия", "Марокко", "Сенегал", "Япония",
        "Южная Корея", "США", "Мексика", "Канада", "Эквадор", "Чили", "Перу", "Тунис",
        "Алжир", "Египет", "Нигерия", "Камерун", "Австралия", "Сауд. Аравия", "Иран", "Сербия"
    ];

    let currentTeams = [];

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function drawTournament() {
        const tournamentType = document.getElementById("tournament-select").value;
        currentTeams = tournamentType === "cl" ? [...clClubs] : [...wcCountries];
        
        shuffle(currentTeams);

        const bracket = document.getElementById("bracket");
        bracket.innerHTML = ""; 

        let html = '<div class="groups-grid">';
        const groupLetters = ["A", "B", "C", "D", "E", "F", "G", "H"];

        for (let i = 0; i < 8; i++) {
            html += `
                <div class="group-container">
                    <div class="group-title">Группа ${groupLetters[i]}</div>
                    <div class="match-list">
            `;

            let gTeams = currentTeams.slice(i * 4, i * 4 + 4);
            const pairs = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
            
            pairs.forEach((pair, mIdx) => {
                let t1 = gTeams[pair[0]];
                let t2 = gTeams[pair[1]];
                let delay = i * 0.05 + mIdx * 0.02;
                html += `
                    <div class="match group-match" data-group="${i}" data-t1="${t1}" data-t2="${t2}" style="animation-delay: ${delay}s">
                        <div class="team home">${t1}</div>
                        <input type="number" class="score-input" min="0" placeholder="0">
                        <span class="vs">⚠️</span>
                        <input type="number" class="score-input" min="0" placeholder="0">
                        <div class="team away">${t2}</div>
                    </div>
                `;
            });

            html += `</div></div>`;
        }
        html += '</div>';

        html += `
            <button onclick="generatePlayoffs()" style="margin-top: 40px; background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);">
                🔥 Сформировать Плей-офф
            </button>
            <div id="playoffs-section" class="playoffs-container"></div>
        `;

        bracket.innerHTML = html;
    }

    function generatePlayoffs() {
        let stats = {};
        currentTeams.forEach(t => {
            stats[t] = { points: 0, gd: 0 };
        });

        document.querySelectorAll('.group-match').forEach(m => {
            const t1 = m.dataset.t1;
            const t2 = m.dataset.t2;
            const inputs = m.querySelectorAll('input');
            const s1 = parseInt(inputs[0].value);
            const s2 = parseInt(inputs[1].value);

            if (!isNaN(s1) && !isNaN(s2)) {
                stats[t1].gd += (s1 - s2);
                stats[t2].gd += (s2 - s1);
                if (s1 > s2) stats[t1].points += 3;
                else if (s1 < s2) stats[t2].points += 3;
                else { stats[t1].points += 1; stats[t2].points += 1; }
            }
        });

        let groupWinners = [];
        for (let i = 0; i < 8; i++) {
            let gTeams = currentTeams.slice(i * 4, i * 4 + 4);
            gTeams.sort((a, b) => {
                if (stats[b].points !== stats[a].points) {
                    return stats[b].points - stats[a].points;
                }
                return stats[b].gd - stats[a].gd;
            });
            groupWinners.push([gTeams[0], gTeams[1]]);
        }

        const r16Pairs = [
            [groupWinners[0][0], groupWinners[1][1]], 
            [groupWinners[2][0], groupWinners[3][1]], 
            [groupWinners[4][0], groupWinners[5][1]], 
            [groupWinners[6][0], groupWinners[7][1]], 
            [groupWinners[1][0], groupWinners[0][1]], 
            [groupWinners[3][0], groupWinners[2][1]], 
            [groupWinners[5][0], groupWinners[4][1]], 
            [groupWinners[7][0], groupWinners[6][1]]  
        ];

        let html = `
            <div class="stage-title">🏆 Плей-офф: 1/8 Финала</div>
            <p style="color: #94a3b8; font-size: 14px; margin-top:-10px; margin-bottom: 20px;">💡 Кликни по названию команды, чтобы продвинуть её в следующий раунд</p>
            <div class="playoff-grid">
        `;

        r16Pairs.forEach((pair, idx) => {
            let side = (idx % 2 === 0) ? 'home' : 'away';
            let nextId = 'qf-' + Math.floor(idx / 2) + '-' + side;
            html += `
                <div class="match">
                    <div class="team home clickable-team" onclick="advanceTo('${nextId}', this)">${pair[0]}</div>
                    <input type="number" class="score-input" min="0" placeholder="0">
                    <span class="vs">❌</span>
                    <input type="number" class="score-input" min="0" placeholder="0">
                    <div class="team away clickable-team" onclick="advanceTo('${nextId}', this)">${pair[1]}</div>
                </div>
            `;
        });
        html += `</div>`;

        html += `<div class="stage-title">⚡ 1/4 Финала</div><div class="playoff-grid">`;
        for(let i=0; i<4; i++) {
            let side = (i % 2 === 0) ? 'home' : 'away';
            let nextId = 'sf-' + Math.floor(i / 2) + '-' + side;
            html += `
                <div class="match">
                    <div id="qf-${i}-home" class="team home clickable-team" onclick="advanceTo('${nextId}', this)">⏳ ...</div>
                    <input type="number" class="score-input" min="0" placeholder="0">
                    <span class="vs">❌</span>
                    <input type="number" class="score-input" min="0" placeholder="0">
                    <div id="qf-${i}-away" class="team away clickable-team" onclick="advanceTo('${nextId}', this)">⏳ ...</div>
                </div>
            `;
        }
        html += `</div>`;

        html += `<div class="stage-title">🔥 1/2 Финала</div><div class="playoff-grid">`;
        for(let i=0; i<2; i++) {
            let side = (i % 2 === 0) ? 'home' : 'away';
            let nextId = 'f-0-' + side;
            html += `
                <div class="match">
                    <div id="sf-${i}-home" class="team home clickable-team" onclick="advanceTo('${nextId}', this)">⏳ ...</div>
                    <input type="number" class="score-input" min="0" placeholder="0">
                    <span class="vs">❌</span>
                    <input type="number" class="score-input" min="0" placeholder="0">
                    <div id="sf-${i}-away" class="team away clickable-team" onclick="advanceTo('${nextId}', this)">⏳ ...</div>
                </div>
            `;
        }
        html += `</div>`;

        html += `
            <div class="stage-title">👑 Финал</div>
            <div style="display: flex; justify-content: center;">
                <div class="match" style="width: 100%; max-width: 400px; border-left: 5px solid #fbbf24; padding: 15px;">
                    <div id="f-0-home" class="team home clickable-team" onclick="showWinner(this)">⏳ ...</div>
                    <input type="number" class="score-input" min="0" placeholder="0">
                    <span class="vs">🏆</span>
                    <input type="number" class="score-input" min="0" placeholder="0">
                    <div id="f-0-away" class="team away clickable-team" onclick="showWinner(this)">⏳ ...</div>
                </div>
            </div>
        `;

        const section = document.getElementById('playoffs-section');
        section.innerHTML = html;
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth' });
    }

    function advanceTo(targetId, element) {
        const teamName = element.innerText;
        if (teamName.includes("...")) return;
        const target = document.getElementById(targetId);
        if (target) target.innerText = teamName;
    }

    function showWinner(element) {
        const teamName = element.innerText;
        if (!teamName.includes("...")) {
            alert('🎉 Победитель турнира: ' + teamName);
        }
    }
</script>

</body>
</html>
